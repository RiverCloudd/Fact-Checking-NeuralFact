decompose_prompt: |
  Tách văn bản thành các claim độc lập, tự chứa, có thể kiểm chứng.
  Trả JSON duy nhất: {{"claims": ["..."]}}.

  Quy tắc:
  1. Mỗi claim phải tự chứa đầy đủ thông tin, không phụ thuộc vào câu trước hoặc sau, không dùng đại từ/vị từ mơ hồ như "đây", "đó", "này", "vậy", v.v.
  2. Giữ nguyên nội dung gốc, không sửa sai, không thêm kiến thức ngoài văn bản.
  3. Không suy diễn. Chỉ viết lại các ý xuất hiện rõ ràng trong văn bản.
  4. Không dùng đại từ mơ hồ; thay bằng chủ thể đầy đủ nếu có trong câu gốc.
  5. Mỗi claim ngắn gọn, độc lập, có thể kiểm chứng.
  6. Nếu một câu là một phát biểu thống nhất gồm kết quả + thời gian + quan hệ giữa các bên, phải giữ nguyên thành một claim; không tách nếu việc tách có thể làm từng phần đúng riêng lẻ nhưng câu gốc sai.
  7. Chỉ tách khi các vế là các sự thật độc lập.
  8. Tối đa {max_claims} claim.

  Ví dụ đúng:
  Văn bản: "Obama là tổng thống thứ 44 của Anh. Ông sinh năm 1961 tại Hawaii."
  Kết quả: {{"claims": ["Obama là tổng thống thứ 44 của Anh.", "Obama sinh năm 1961 tại Hawaii."]}}

  Văn bản: "Iran thắng Mỹ vào năm 2026."
  Kết quả: {{"claims": ["Iran thắng Mỹ vào năm 2026."]}}

  Văn bản: "Iran tuyên bố chiến thắng Mỹ. Cuộc chiến diễn ra vào năm 2026."
  Kết quả: {{"claims": ["Iran tuyên bố chiến thắng Mỹ.", "Cuộc chiến giữa Iran và Mỹ diễn ra vào năm 2026."]}}

  Văn bản: {doc}
  Kết quả:


checkworthy_prompt: |
  Nhiệm vụ: Đánh giá từng mệnh đề xem có phải là thông tin thực tế, có thể kiểm chứng khách quan bằng bằng chứng hay không. Một mệnh đề "đáng kiểm chứng" nếu là khẳng định về sự thật, có thể kiểm tra qua nguồn đáng tin cậy.

  Tiêu chí:
  - Là phát biểu về sự kiện, dữ liệu, thông tin đúng/sai (không phải ý kiến, cảm xúc, đánh giá chủ quan).
  - Đề cập đối tượng, sự kiện, con số cụ thể, xác định rõ ràng (không dùng đại từ mơ hồ như "anh ấy", "nó" nếu không rõ ngữ cảnh).
  - Có thể tra cứu, đối chiếu với nguồn độc lập (bách khoa, báo cáo, thống kê...).
  - Là câu khẳng định hoặc phủ định (không phải câu hỏi, mệnh lệnh, điều kiện).

  Ví dụ:

  - "Barack Obama là tổng thống Hoa Kỳ." → **Có** (Đây là một sự thật lịch sử có thể kiểm chứng, với chủ thể rõ ràng.)
  - "Thuốc XYZ không chữa khỏi bệnh ung thư." → **Có** (Một tuyên bố y học có thể kiểm tra bằng nghiên cứu.)
  - "Dân số Việt Nam năm 2023 là 100 triệu người." → **Có** (Số liệu thống kê có thể kiểm tra.)
  - "Anh ấy là kỹ sư." → **Không** (Thiếu thông tin về "anh ấy", không thể xác minh.)
  - "Giải chạy marathon là môn thể thao tuyệt vời nhất." → **Không** (Ý kiến chủ quan.)
  - "Nên ăn nhiều rau xanh để tốt cho sức khỏe." → **Không** (Lời khuyên, không phải khẳng định thực tế.)

  Phản hồi phải ở định dạng JSON. Mỗi mệnh đề là một khóa, giá trị là "Có" hoặc "Không" kèm theo lý do ngắn gọn trong ngoặc đơn. Ví dụ:
  {{
      "Barack Obama là tổng thống Hoa Kỳ.": "Có (Thông tin về chức vụ của một người cụ thể, có thể kiểm tra.)",
      "Giải chạy marathon là môn thể thao tuyệt vời nhất.": "Không (Đánh giá chủ quan.)"
  }}

  Đối với các mệnh đề sau:
  {texts}

  Kết quả:


qgen_prompt: |
  Cho một mệnh đề, nhiệm vụ của bạn là tạo ra số lượng câu hỏi TỐI THIỂU cần thiết để tra cứu và xác minh tính chính xác của mệnh đề đó trên công cụ tìm kiếm.
  Xuất ra định dạng JSON với một khóa duy nhất "Questions", giá trị là danh sách các câu hỏi.

  Ví dụ:
  Mệnh đề: Tuyến đường sắt đô thị Cát Linh - Hà Đông có chiều dài 13km và bao gồm 12 nhà ga.
  Kết quả: {{"Questions": ["Chiều dài của tuyến đường sắt Cát Linh - Hà Đông là bao nhiêu?", "Tuyến đường sắt Cát Linh - Hà Đông có bao nhiêu nhà ga?"]}}

  Mệnh đề: Giải chạy việt dã Thành phố Hồ Chí Minh (HCMC Marathon) năm 2026 sẽ được tổ chức vào ngày 22 tháng 3.
  Kết quả: {{"Questions": ["HCMC Marathon 2026 được tổ chức vào ngày nào?", "Giải chạy marathon nào diễn ra ở TP.HCM vào ngày 22/3/2026?"]}}

  Mệnh đề: {claim}
  Kết quả:


verify_prompt: |
  Nhiệm vụ của bạn là đóng vai trò một giám khảo khách quan, đánh giá độ chính xác của [Mệnh đề] CHỈ DỰA VÀO [Bằng chứng] được cung cấp.
  TUYỆT ĐỐI KHÔNG sử dụng kiến thức nền của bạn. Hãy coi [Bằng chứng] là sự thật tuyệt đối.

  Quy tắc đánh giá:
  1. Nếu bằng chứng trực tiếp xác nhận, hoặc chứa các từ khóa đồng nghĩa chứng minh [Mệnh đề] là đúng -> factuality: true.
  2. Việc bằng chứng là các đoạn trích ngắn (snippets) hoặc tiêu đề câu hỏi không làm giảm tính xác thực nếu nội dung bên trong nó ủng hộ mệnh đề.
  3. Chỉ trả về false khi bằng chứng trực tiếp phủ nhận [Mệnh đề], hoặc hoàn toàn không liên quan.

  Phản hồi BẮT BUỘC bằng định dạng JSON với 4 khóa sau:
  - "reasoning": Trích dẫn đoạn text cụ thể từ bằng chứng ủng hộ hoặc bác bỏ mệnh đề (tối đa 30 từ).
  - "error": Ghi "không có" nếu mệnh đề đúng. Nếu sai, chỉ ra điểm mâu thuẫn.
  - "correction": Ghi "không có" nếu mệnh đề đúng. Nếu sai, sửa lại cho đúng với bằng chứng.
  - "factuality": true hoặc false (boolean).

  Input:
  [Ngữ cảnh gốc]: {original_doc}
  [Mệnh đề]: {claim}
  [Bằng chứng]: {evidence}

  Output JSON:

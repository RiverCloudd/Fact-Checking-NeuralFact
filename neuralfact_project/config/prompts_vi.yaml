decompose_prompt: |
  Tách văn bản thành các claim độc lập, tự chứa, có thể kiểm chứng.
  Trả JSON duy nhất: {{"claims": ["..."]}}.

  Quy tắc:
  1. Mỗi claim phải tự chứa đầy đủ thông tin (chủ thể, thời gian, địa điểm, sự kiện liên quan) để có thể hiểu được sự thật mà không cần đọc câu trước hoặc sau. 
  2. Giữ nguyên nội dung gốc, không sửa sai, không thêm kiến thức ngoài văn bản.
  3. Không suy diễn. Chỉ viết lại các ý xuất hiện rõ ràng.
  4. TUYỆT ĐỐI bế toàn bộ bối cảnh (thời gian cụ thể, sự kiện, địa điểm) từ mệnh đề trước gắn vào mệnh đề sau nếu mệnh đề sau có tính kế thừa. Thay đại từ mơ hồ bằng chủ thể đầy đủ.
  5. Mỗi claim ngắn gọn, độc lập, có thể kiểm chứng.
  6. **Normalize temporal references**: CHỈ KHI claim có chứa các từ chỉ thời gian tương đối rõ ràng (hôm nay, hôm qua, tuần trước, hiện nay, năm ngoái, v.v.), mới chuyển đổi sang ngày cụ thể dựa trên mốc thời gian hiện tại là ({current_date}). Bạn phải tự tính toán cộng trừ ngày tháng hợp lý. NẾU KHÔNG CÓ TỪ CHỈ THỜI GIAN, KHÔNG ĐƯỢC THÊM NGÀY THÁNG VÀO CLAIM.
     - Ví dụ có từ tương đối: "giá xăng hiện nay cao" → "giá xăng ngày {current_date} cao"
     - Ví dụ mốc thời gian trước: "tuần trước trời mưa" → Tự tính khoảng thời gian của "tuần trước" so với mốc {current_date} (giả sử {current_date} là 08/04/2026 thì điền "trong khoảng từ ngày 30/03/2026 đến 05/04/2026 trời mưa")
     - Ví dụ KHÔNG có từ tương đối: "Việt Nam có 63 tỉnh" → Giữ nguyên: "Việt Nam có 63 tỉnh" (TUYỆT ĐỐI KHÔNG SỬA THÀNH "Tính đến ngày... Việt Nam có 63 tỉnh")
  7. Tối đa {max_claims} claim.

  Ví dụ decompose:
  - Văn bản: "Obama là tổng thống thứ 44 của Anh. Ông sinh năm 1961 tại Hawaii."
    → {{"claims": ["Obama là tổng thống thứ 44 của Anh.", "Obama sinh năm 1961 tại Hawaii."]}}

  - Văn bản: "VinFast niêm yết trên NYSE vào 15/8/2023. Ngay sau phiên giao dịch đầu tiên, vốn hóa đạt 100 tỷ USD."
    → {{"claims": ["VinFast niêm yết trên sàn NYSE vào ngày 15/8/2023.", "Ngay sau phiên giao dịch đầu tiên trên sàn NYSE vào ngày 15/8/2023, vốn hóa của VinFast đạt 100 tỷ USD."]}}

  - Văn bản: "Hôm nay trời mưa. Tôi hôm nay không đi làm."
    → {{"claims": ["Ngày {current_date} trời mưa.", "Ngày {current_date} tôi không đi làm."]}}

  Văn bản: {doc}
  Kết quả:


checkworthy_prompt: |
  Nhiệm vụ của bạn là đánh giá từng mệnh đề được cung cấp để xác định xem nó có chứa thông tin thực tế có thể được xác minh khách quan bằng bằng chứng hay không. Một mệnh đề được coi là "đáng kiểm chứng" (check-worthy) nếu nó là một khẳng định về sự thật có thể kiểm tra được qua các nguồn đáng tin cậy.

  Hãy xem xét các tiêu chí sau:
  1. **Tính thực tế**: Mệnh đề phải là một phát biểu về sự việc, sự kiện, dữ liệu, hoặc thông tin có thể đúng hoặc sai. Nó không phải là ý kiến chủ quan, cảm xúc, đánh giá giá trị (ví dụ: "tốt nhất", "đẹp", "nên").
  2. **Tính cụ thể**: Mệnh đề phải đề cập đến các đối tượng, sự kiện, con số cụ thể, có thể xác định rõ ràng. Tránh các đại từ không rõ ràng như "anh ấy", "cô ấy", "nó", trừ khi ngữ cảnh đã xác định (nhưng ở đây chúng ta xét từng mệnh đề độc lập). Các tên riêng (người, địa danh, tổ chức) là đủ cụ thể.
  3. **Tính khả kiểm**: Thông tin trong mệnh đề có thể được tra cứu, đối chiếu với các nguồn độc lập như bách khoa toàn thư, cơ sở dữ liệu, báo cáo khoa học, thống kê chính thức, v.v.
  4. **Tính khẳng định**: Mệnh đề ở dạng khẳng định (không phải câu hỏi, mệnh lệnh, hay giả định). Ví dụ: "Nếu A thì B" là một điều kiện, không phải khẳng định trực tiếp.

  Dưới đây là một số ví dụ minh họa:

  - "Barack Obama là tổng thống Hoa Kỳ." → **Có** (Đây là một sự thật lịch sử có thể kiểm chứng, với chủ thể rõ ràng.)
  - "Thuốc XYZ chữa khỏi bệnh ung thư." → **Có** (Một tuyên bố y học có thể kiểm tra bằng nghiên cứu.)
  - "Dân số Việt Nam năm 2023 là 100 triệu người." → **Có** (Số liệu thống kê có thể kiểm tra.)
  - "Trái đất quay quanh Mặt trời." → **Có** (Sự thật khoa học.)
  - "Anh ấy là kỹ sư." → **Không** (Thiếu thông tin về "anh ấy" là ai, không thể xác minh.)
  - "Giải chạy marathon là môn thể thao tuyệt vời nhất." → **Không** (Ý kiến chủ quan, không thể kiểm chứng.)
  - "Nên ăn nhiều rau xanh để tốt cho sức khỏe." → **Không** (Lời khuyên, không phải khẳng định thực tế.)
  - "Có thể trời sẽ mưa vào ngày mai." → **Không** (Dự báo, không phải sự thật hiện tại có thể kiểm tra.)
  - "Thuật toán SVM luôn cho kết quả tốt hơn Decision Tree." → **Không** (Nhận định phụ thuộc vào ngữ cảnh, không phải sự thật tuyệt đối.)

  Phản hồi phải ở định dạng JSON. Mỗi mệnh đề là một khóa, giá trị là "Có" hoặc "Không" kèm theo lý do ngắn gọn trong ngoặc đơn. Ví dụ:
  {{
      "Barack Obama là tổng thống Hoa Kỳ.": "Có (Thông tin về chức vụ của một người cụ thể, có thể kiểm tra.)",
      "Giải chạy marathon là môn thể thao tuyệt vời nhất.": "Không (Đánh giá chủ quan.)"
  }}

  Đối với các mệnh đề sau:
  {texts}

  Kết quả:


verify_prompt: |
  Nhiệm vụ của bạn là đóng vai trò một giám khảo khách quan, đánh giá độ chính xác của [Mệnh đề] DỰA VÀO [Bằng chứng] được cung cấp. LƯU Ý QUAN TRỌNG: [Mệnh đề] đôi khi đề cập đến một sự thật đang diễn ra ở thời điểm hiện tại (cụ thể là năm {current_year}).

  TUYỆT ĐỐI KHÔNG sử dụng kiến thức nền của bạn. Hãy coi [Bằng chứng] là nguồn tham chiếu duy nhất. Tuy nhiên, bạn phải suy luận về TÍNH CẬP NHẬT (Outdated information):
  
  Quy tắc đánh giá:
  1. Yêu cầu khớp TOÀN BỘ CHI TIẾT: [Mệnh đề] chỉ được đánh giá là đúng nếu bằng chứng xác nhận đầy đủ mọi yếu tố. 
  2. BẮT LỖI THÔNG TIN LỖI THỜI (Outdated Evidence): Nếu mệnh đề là một khẳng định ở hiện tại (viết ở thì hiện tại hoặc ngầm hiểu là hiện tại) nhưng bằng chứng nhắc đến thời điểm trong quá khứ và CÓ KHẢ NĂNG bị thay đổi (ví dụ: số lượng tỉnh thành, dân số, chức vụ lãnh đạo), bạn phải cẩn trọng. Nếu bạn có một bằng chứng khác mới hơn hoặc cập nhật hơn chỉ ra một sự thật khác (ví dụ: nay chỉ còn 34 tỉnh), thì thông tin 63 tỉnh là SAI (Lỗi thời). Tuy nhiên, nếu bằng chứng là một sự thật bất biến hoặc trạng thái kế thừa (ví dụ: Hà Nội là thủ đô từ 1946 đến nay), thì ĐÁNH GIÁ TRUE.
  3. XỬ LÝ RANH GIỚI NHIỆM KỲ (Term Limits): Nếu bằng chứng nhắc đến một nhiệm kỳ sẽ kết thúc ngay trong năm hiện tại (ví dụ nhiệm kỳ 2021-{current_year}), thì trạng thái "đương nhiệm" hay "nhiệm kỳ trước" rất nhạy cảm. Nếu mệnh đề khẳng định là "nhiệm kỳ trước" hoặc "đã rời chức" nhưng các bằng chứng CÓ SẴN (dù là mới nhất) vẫn chỉ ghi là nhiệm kỳ 2021-{current_year} mà không đề cập đến chức vụ thay thế, hãy bắt lỗi là "Chưa có thông tin xác nhận việc chuyển giao chức vụ mới" thay vì kết luận gay gắt là mệnh đề sai hoàn toàn do mâu thuẫn thời gian.
  4. BẮT LỖI GHÉP NỐI SAI (Mismatched Time/Event): Mệnh đề khẳng định "sự kiện X đạt kết quả Y vào thời điểm T1" nhưng Bằng chứng cho thấy "sự kiện X đạt kết quả Y vào thời điểm T2" -> ĐÁNH GIÁ FALSE. 
  5. Mệnh đề bị bác bỏ nếu có bất kỳ điểm mâu thuẫn lớn nào với các bằng chứng cập nhật nhất.

  Phản hồi BẮT BUỘC bằng định dạng JSON với 4 khóa sau:
  - "reasoning": Giải thích đối chiếu giữa mệnh đề và bằng chứng (tối đa 30 từ).
  - "error": Ghi "không có" nếu mệnh đề đúng. Nếu sai, chỉ ra điểm mâu thuẫn hoặc sự lỗi thời.
  - "correction": Ghi "không có" nếu mệnh đề đúng. Nếu sai, sửa lại cho đúng.
  - "factuality": true hoặc false (boolean).

  Input:
  [Ngữ cảnh gốc]: {original_doc}
  [Mệnh đề]: {claim}
  [Bằng chứng]: {evidence}

  Output JSON:

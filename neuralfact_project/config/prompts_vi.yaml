decompose_prompt: |
  Nhiệm vụ của bạn là phân tách văn bản dưới đây thành các mệnh đề nguyên tử (atomic claims) để phục vụ cho hệ thống kiểm chứng sự thật (Fact-checking).
  Câu trả lời phải là định dạng JSON với một khóa duy nhất "claims", chứa danh sách các chuỗi.

  [CÁC QUY TẮC BẮT BUỘC TUÂN THỦ]:
  1. Tính trọn vẹn ngữ cảnh: Mỗi mệnh đề phải tự đứng độc lập và giữ nguyên bối cảnh. Nếu câu gốc mô tả một sự kiện gắn với các chủ thể (người, tổ chức, địa điểm), bạn phải lặp lại đầy đủ các chủ thể đó vào TỪNG mệnh đề.
  2. Không dùng đại từ: Tuyệt đối tránh các từ tham chiếu mơ hồ như 'anh ấy', 'cô ấy', 'nó', 'điều này', 'công ty đó'. Hãy sử dụng tên đầy đủ.
  3. Ràng buộc đối tượng: Nếu một con số hoặc hành động thuộc về một mối quan hệ, phải nêu rõ các bên liên quan.
  4. Mỗi mệnh đề phải ngắn gọn (dưới 20 từ) và chứa một ý duy nhất có thể kiểm chứng.

  Ví dụ:
  Văn bản: "Cầu thủ Nguyễn Quang Hải đã ký bản hợp đồng kéo dài 5 năm với câu lạc bộ Pau FC của Pháp."
  Kết quả:
  {{"claims": ["Nguyễn Quang Hải đã ký bản hợp đồng với câu lạc bộ Pau FC.", "Bản hợp đồng giữa Nguyễn Quang Hải và câu lạc bộ Pau FC kéo dài 5 năm.", "Câu lạc bộ Pau FC thuộc nước Pháp."]}}

  Văn bản: {doc}
  Kết quả:


checkworthy_prompt: |
  Nhiệm vụ của bạn là đánh giá từng mệnh đề được cung cấp để xác định xem nó có chứa thông tin thực tế có thể được xác minh khách quan bằng bằng chứng hay không.

  Hãy xem xét các tiêu chí sau:
  1. Sự thật vs. Ý kiến: Phân biệt giữa ý kiến chủ quan (không thể xác minh) và các khẳng định thực tế.
  2. Rõ ràng và Cụ thể: Mệnh đề phải có chủ thể rõ ràng. (VD: "Anh ấy là kỹ sư" -> Không thể xác minh vì thiếu ngữ cảnh).
  3. Độc lập: Mệnh đề phải chứa thông tin có thể tra cứu độc lập trên các công cụ tìm kiếm hoặc cơ sở dữ liệu.

  Phản hồi phải ở định dạng JSON. Mỗi mệnh đề là một khóa, giá trị là "Có" hoặc "Không" kèm theo lý do ngắn gọn trong ngoặc đơn.

  Ví dụ:
  1. Thuật toán SVM (Support Vector Machine) luôn cho kết quả tốt hơn Decision Tree.
  2. Giải chạy marathon là môn thể thao tuyệt vời nhất.
  3. Ông ấy là giám đốc của tập đoàn Vingroup.
  4. Phạm Nhật Vượng là chủ tịch hội đồng quản trị của tập đoàn Vingroup.

  Kết quả mong đợi:
  {{
      "Thuật toán SVM (Support Vector Machine) luôn cho kết quả tốt hơn Decision Tree.": "Không (Đây là nhận định mang tính tương đối phụ thuộc vào tập dữ liệu, không phải sự thật tuyệt đối.)",
      "Giải chạy marathon là môn thể thao tuyệt vời nhất.": "Không (Đây là ý kiến đánh giá chủ quan.)",
      "Ông ấy là giám đốc của tập đoàn Vingroup.": "Không (Thiếu tham chiếu cụ thể về việc 'Ông ấy' là ai.)",
      "Phạm Nhật Vượng là chủ tịch hội đồng quản trị của tập đoàn Vingroup.": "Có (Chứa thông tin thực tế có thể kiểm chứng về chức danh của một cá nhân cụ thể.)"
  }}

  Đối với các mệnh đề sau:
  {texts}

  Kết quả:


qgen_prompt: |
  Cho một mệnh đề, nhiệm vụ của bạn là tạo ra số lượng câu hỏi TỐI THIỂU cần thiết để tra cứu và xác minh tính chính xác của mệnh đề đó trên công cụ tìm kiếm.
  Xuất ra định dạng JSON với một khóa duy nhất "Questions", giá trị là danh sách các câu hỏi.

  Ví dụ:
  Mệnh đề: Tuyến đường sắt đô thị Cát Linh - Hà Đông có chiều dài 13km và bao gồm 12 nhà ga.
  Kết quả: {{"Questions": ["Chiều dài của tuyến đường sắt Cát Linh - Hà Đông là bao nhiêu?", "Tuyến đường sắt Cát Linh - Hà Đông có bao nhiêu nhà ga?"]}}

  Mệnh đề: Giải chạy việt dã Thành phố Hồ Chí Minh (HCMC Marathon) năm 2026 sẽ được tổ chức vào ngày 22 tháng 3.
  Kết quả: {{"Questions": ["HCMC Marathon 2026 được tổ chức vào ngày nào?", "Giải chạy marathon nào diễn ra ở TP.HCM vào ngày 22/3/2026?"]}}

  Mệnh đề: {claim}
  Kết quả:


verify_prompt: |
  Nhiệm vụ của bạn là đánh giá độ chính xác của một [Mệnh đề] được trích xuất từ [Ngữ cảnh gốc], dựa trên [Bằng chứng] đi kèm.
  Hãy đọc kỹ bằng chứng. Nếu bằng chứng thiếu chi tiết, không có nghĩa là mệnh đề sai. Hãy phân biệt rõ ràng giữa phần thông tin bị sai lệch và phần thông tin được bằng chứng ủng hộ.

  Phản hồi bằng định dạng JSON bao gồm 4 khóa sau:
  - "reasoning": Giải thích logic suy luận của bạn dựa trên bằng chứng.
  - "error": Ghi "không có" nếu mệnh đề đúng. Nếu sai, hãy chỉ ra điểm sai lệch cụ thể.
  - "correction": Ghi "không có" nếu mệnh đề đúng. Nếu sai, cung cấp câu sửa lỗi dựa trên bằng chứng.
  - "factuality": true (nếu đúng sự thật), false (nếu sai sự thật), hoặc "NEI" (Not Enough Information - nếu bằng chứng không đề cập đến).

  Input:
  [Ngữ cảnh gốc]: Thành phố Hồ Chí Minh có dân số khoảng 9 triệu người.
  [Mệnh đề]: Thành phố Hồ Chí Minh có dân số khoảng 9 triệu người.
  [Bằng chứng]: Theo số liệu năm 2023, dân số nội thành TP.HCM là khoảng 9,3 triệu người.

  Output:
  {{
      "reasoning": "Bằng chứng cho thấy dân số nội thành là 9,3 triệu, rất gần với mức ước lượng khoảng 9 triệu người trong mệnh đề. Do đó có thể coi là chính xác.",
      "error": "không có",
      "correction": "không có",
      "factuality": true
  }}

  Input:
  [Ngữ cảnh gốc]: {original_doc}
  [Mệnh đề]: {claim}
  [Bằng chứng]: {evidence}

  Output:
